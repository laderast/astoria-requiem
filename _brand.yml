#logo: logos/icon/brand-yml-icon-color.svg

color:
  palette:
    black: "#1A1A1A"
    white: "#F9F9F9"
    orange: "#FF6F20"
    pink: "#FF3D7F"
  primary: "#7fb5a0"    # Deep ocean blue
  secondary: "#2e8b8b"   # Teal / sea green
  foreground: "#f5f9fa"     # Pale blue-gray
  background: "#2c3e50"  # Dark slate
  #foreground: black
  #background: white
  #primary: orange
  #danger: pink

typography:
  fonts:
    - family: Open Sans
      source: google
    - family: Rubik
      source: google
    - family: IBM Plex Mono
      source: google

  base: Open Sans
  headings:
    family: Rubik
    weight: 400
  monospace: IBM Plex Mono