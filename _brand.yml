# Sea-inspired color palette for Astoria Requiem

# success: "#7fb5a0"     # Seafoam green
# info: "#87ceeb"        # Light sky blue
# warning: "#d4a017"     # Sandy gold
# danger: "#c0392b"      # Coral red
# light: "#e8f4f8"       # Sea foam white
# dark: "#0d1b2a"        # Deep navy
#body-bg: "#f5f9fa"     # Pale blue-gray
